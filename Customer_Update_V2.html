<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Customer Updates</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@100..900&display=swap" rel="stylesheet">
	<style>
		body {
			font-family: 'Archivo', sans-serif;
			font-optical-sizing: auto;
			font-variation-settings: "wdth" 100;
		}

		.theme-verdant {
			--bg-gradient-from: #059669; --bg-gradient-to: #047857;
			--title-text: #ffffff; --subtitle-text: #d1fae5;
			--card-bg: #f9fafb; --card-hover-bg: #ffffff; --card-text: #374151; --card-title: #1f2937;
			--card-border: #f3f4f6; --card-divider: #e5e7eb; --sub-text: #6b7280; --accent: #22c55e;
			--search-bg: #ffffff; --search-text: #374151; --search-placeholder: #9ca3af;
			--search-border: transparent; --search-ring: #34d399; --search-icon: #9ca3af;
			--loading-text: rgba(255,255,255,0.8); --loading-spinner: #ffffff; --no-results-text: rgba(255,255,255,0.7);
			--dropdown-bg: rgba(255,255,255,0.15); --dropdown-text: #ffffff; --dropdown-hover: rgba(255,255,255,0.25); --dropdown-border: rgba(255,255,255,0.2);
			--dropdown-option-bg: #1f2937; --dropdown-option-text: #e5e7eb; --dropdown-option-hover: #374151;
			--btn-bg: #22c55e; --btn-hover: #16a34a; --btn-text: #ffffff;
		}
		.theme-paperbound {
			--bg-gradient-from: #faf9f6; --bg-gradient-to: #f5f0e8;
			--title-text: #2c2c2c; --subtitle-text: #6b6b6b;
			--card-bg: #ffffff; --card-hover-bg: #fefefe; --card-text: #3a3a3a; --card-title: #1a1a1a;
			--card-border: #c5bfb0; --card-divider: #c5bfb0; --sub-text: #7a7a7a; --accent: #b8860b;
			--search-bg: #ffffff; --search-text: #2c2c2c; --search-placeholder: #a0a0a0;
			--search-border: #a89f8d; --search-ring: #b8860b; --search-icon: #a0a0a0;
			--loading-text: #6b6b6b; --loading-spinner: #b8860b; --no-results-text: #8a8a8a;
			--dropdown-bg: rgba(0,0,0,0.05); --dropdown-text: #2c2c2c; --dropdown-hover: rgba(0,0,0,0.1); --dropdown-border: rgba(0,0,0,0.1);
			--dropdown-option-bg: #ffffff; --dropdown-option-text: #2c2c2c; --dropdown-option-hover: #f5f0e8;
			--btn-bg: #b8860b; --btn-hover: #9a7209; --btn-text: #ffffff;
		}
		.theme-midnight {
			--bg-gradient-from: #1a252f; --bg-gradient-to: #2c3e50;
			--title-text: #ecf0f1; --subtitle-text: #95a5a6;
			--card-bg: #34495e; --card-hover-bg: #3d566e; --card-text: #bdc3c7; --card-title: #ecf0f1;
			--card-border: #2c3e50; --card-divider: #2c3e50; --sub-text: #95a5a6; --accent: #3498db;
			--search-bg: #34495e; --search-text: #ecf0f1; --search-placeholder: #7f8c8d;
			--search-border: #2c3e50; --search-ring: #3498db; --search-icon: #7f8c8d;
			--loading-text: rgba(236,240,241,0.8); --loading-spinner: #3498db; --no-results-text: rgba(189,195,199,0.7);
			--dropdown-bg: rgba(0,0,0,0.2); --dropdown-text: #ecf0f1; --dropdown-hover: rgba(0,0,0,0.3); --dropdown-border: rgba(255,255,255,0.1);
			--dropdown-option-bg: #2c3e50; --dropdown-option-text: #ecf0f1; --dropdown-option-hover: #34495e;
			--btn-bg: #3498db; --btn-hover: #2980b9; --btn-text: #ffffff;
		}
		.theme-stone {
			--bg-gradient-from: #6b6b6b; --bg-gradient-to: #7e7e7e;
			--title-text: #ffffff; --subtitle-text: #e0e0e0;
			--card-bg: #f0f0f0; --card-hover-bg: #f5f5f5; --card-text: #4a4a4a; --card-title: #2a2a2a;
			--card-border: #d5d5d5; --card-divider: #d5d5d5; --sub-text: #6a6a6a; --accent: #888888;
			--search-bg: #ffffff; --search-text: #3a3a3a; --search-placeholder: #999999;
			--search-border: #d0d0d0; --search-ring: #888888; --search-icon: #999999;
			--loading-text: rgba(255,255,255,0.8); --loading-spinner: #ffffff; --no-results-text: rgba(255,255,255,0.7);
			--dropdown-bg: rgba(0,0,0,0.15); --dropdown-text: #ffffff; --dropdown-hover: rgba(0,0,0,0.25); --dropdown-border: rgba(255,255,255,0.2);
			--dropdown-option-bg: #4a4a4a; --dropdown-option-text: #e0e0e0; --dropdown-option-hover: #5a5a5a;
			--btn-bg: #888888; --btn-hover: #6a6a6a; --btn-text: #ffffff;
		}
		.theme-sunset {
			--bg-gradient-from: #d4846a; --bg-gradient-to: #e9967a;
			--title-text: #ffffff; --subtitle-text: #fce4d6;
			--card-bg: #fdf6f0; --card-hover-bg: #ffffff; --card-text: #5a3e2b; --card-title: #3d2517;
			--card-border: #f0d5c4; --card-divider: #f0d5c4; --sub-text: #8a6a55; --accent: #e07040;
			--search-bg: #ffffff; --search-text: #5a3e2b; --search-placeholder: #b89a88;
			--search-border: #e8c4b0; --search-ring: #e07040; --search-icon: #b89a88;
			--loading-text: rgba(255,255,255,0.85); --loading-spinner: #ffffff; --no-results-text: rgba(255,255,255,0.75);
			--dropdown-bg: rgba(0,0,0,0.1); --dropdown-text: #ffffff; --dropdown-hover: rgba(0,0,0,0.2); --dropdown-border: rgba(255,255,255,0.2);
			--dropdown-option-bg: #5a3e2b; --dropdown-option-text: #fce4d6; --dropdown-option-hover: #6a4e3b;
			--btn-bg: #e07040; --btn-hover: #c85a30; --btn-text: #ffffff;
		}
		.theme-oceanic {
			--bg-gradient-from: #4a657a; --bg-gradient-to: #5D7B93;
			--title-text: #ffffff; --subtitle-text: #dce6f0;
			--card-bg: #e8eef3; --card-hover-bg: #ffffff; --card-text: #3e5266; --card-title: #2c3e50;
			--card-border: #b8c8d8; --card-divider: #b8c8d8; --sub-text: #6b8299; --accent: #3b82b8;
			--search-bg: #ffffff; --search-text: #2c3e50; --search-placeholder: #8fa3b8;
			--search-border: #b0c4d8; --search-ring: #5D7B93; --search-icon: #8fa3b8;
			--loading-text: rgba(255,255,255,0.8); --loading-spinner: #ffffff; --no-results-text: rgba(255,255,255,0.7);
			--dropdown-bg: rgba(0,0,0,0.1); --dropdown-text: #ffffff; --dropdown-hover: rgba(0,0,0,0.2); --dropdown-border: rgba(255,255,255,0.2);
			--dropdown-option-bg: #2c3e50; --dropdown-option-text: #e0e0e0; --dropdown-option-hover: #3e5266;
			--btn-bg: #3b82b8; --btn-hover: #2d6a9a; --btn-text: #ffffff;
		}
		.theme-twilight {
			--bg-gradient-from: #2a1d3d; --bg-gradient-to: #3D2B56;
			--title-text: #f3e8ff; --subtitle-text: #d8b4fe;
			--card-bg: #ffffff; --card-hover-bg: #fdfbff; --card-text: #4a3b69; --card-title: #2e1a47;
			--card-border: #c4b5fd; --card-divider: #ddd6fe; --sub-text: #6b5b8a; --accent: #a855f7;
			--search-bg: #ffffff; --search-text: #2e1a47; --search-placeholder: #a78bfa;
			--search-border: #c4b5fd; --search-ring: #a855f7; --search-icon: #a78bfa;
			--loading-text: rgba(243,232,255,0.8); --loading-spinner: #ffffff; --no-results-text: rgba(243,232,255,0.7);
			--dropdown-bg: rgba(0,0,0,0.2); --dropdown-text: #ffffff; --dropdown-hover: rgba(0,0,0,0.3); --dropdown-border: rgba(255,255,255,0.2);
			--dropdown-option-bg: #2e1a47; --dropdown-option-text: #e9d5ff; --dropdown-option-hover: #4a3b69;
			--btn-bg: #a855f7; --btn-hover: #9333ea; --btn-text: #ffffff;
		}

		body { background: linear-gradient(to bottom, var(--bg-gradient-from), var(--bg-gradient-to)); transition: background 0.5s ease; }
		#titleText { color: var(--title-text); }
		#subtitleText { color: var(--subtitle-text); }
		#searchBar { background: var(--search-bg); color: var(--search-text); border: 1px solid var(--search-border); }
		#searchBar::placeholder { color: var(--search-placeholder); }
		#searchBar:focus { border-color: var(--search-ring); }
		#searchIcon { color: var(--search-icon); }
		#loadingState p { color: var(--loading-text); }
		#loadingSpinner { border-color: var(--loading-spinner); border-top-color: transparent; }
		#noResults { color: var(--no-results-text); }
		.customer-card { background: var(--card-bg); border: 1px solid var(--card-border); transition: all 0.3s ease; }
		.customer-card:hover { background: var(--card-hover-bg); }
		.card-title { color: var(--card-title); }
		.card-text { color: var(--card-text); }
		.card-sub { color: var(--sub-text); }
		.card-divider { border-color: var(--card-divider); }
		.accent-dot { color: var(--accent); }
		#themeDropdown { background: var(--dropdown-bg); color: var(--dropdown-text); border-color: var(--dropdown-border); }
		#themeDropdown option { background: var(--dropdown-option-bg); color: var(--dropdown-option-text); }
		#addEditBtn { background: var(--btn-bg); color: var(--btn-text); transition: all 0.3s ease; }
		#addEditBtn:hover { background: var(--btn-hover); }

		.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
		.modal-overlay.active { display: flex; }
		.modal-box { background: var(--card-bg); color: var(--card-text); border-radius: 12px; padding: 24px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
		.modal-box h2 { color: var(--card-title); }
		.modal-input { background: var(--search-bg); color: var(--search-text); border: 1px solid var(--search-border); }
		.modal-input::placeholder { color: var(--search-placeholder); }
		.modal-input:focus { border-color: var(--search-ring); }
		.modal-btn-primary { background: var(--btn-bg); color: var(--btn-text); }
		.modal-btn-primary:hover { background: var(--btn-hover); }
		.modal-btn-secondary { background: var(--dropdown-bg); color: var(--dropdown-text); border: 1px solid var(--dropdown-border); }
		.modal-btn-secondary:hover { background: var(--dropdown-hover); }
		.modal-btn-danger { background: #ef4444; color: #ffffff; }
		.modal-btn-danger:hover { background: #dc2626; }
		.editor-item { border: 1px solid var(--card-divider); background: var(--card-bg); }
		#loginError { color: #ef4444; }

		.edit-mode-indicator { display: none; position: fixed; top: 4px; left: 50%; transform: translateX(-50%); z-index: 50; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background: #ef4444; color: #ffffff; box-shadow: 0 4px 12px rgba(239,68,68,0.4); }
		.edit-mode-indicator.active { display: flex; align-items: center; gap: 6px; }

		#editBar { display: none; }
		#editBar.active { display: block; }

		#saveBar { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding: 12px 24px; background: var(--card-bg); border-top: 1px solid var(--card-divider); box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
		#saveBar.active { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
		#saveBar p { color: var(--card-text); }

		#addCustomerBtn { display: none; }
		#addCustomerBtn.active { display: inline-flex; }

		.editable-text { cursor: text; padding: 2px 4px; border-radius: 4px; border: 1px solid transparent; }
		.editable-text:hover { border-color: var(--card-divider); }
		.editable-text:focus { outline: none; border-color: var(--accent); background: var(--search-bg); }
		.edit-name { cursor: text; padding: 2px 6px; border-radius: 4px; border: 1px solid transparent; }
		.edit-name:hover { border-color: var(--card-divider); }
		.edit-name:focus { outline: none; border-color: var(--accent); background: var(--search-bg); }
		.delete-customer-btn { position: absolute; top: 12px; right: 12px; opacity: 0; transition: opacity 0.2s; }
		.customer-card.editable:hover .delete-customer-btn { opacity: 1; }
		.add-point-btn, .add-sub-btn { cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
		.add-point-btn:hover, .add-sub-btn:hover { opacity: 1; }
		.remove-btn { cursor: pointer; opacity: 0.4; transition: opacity 0.2s; }
		.remove-btn:hover { opacity: 1; }
	</style>
</head>
<body class="theme-midnight min-h-screen p-4 md:p-8">
	<div class="fixed top-4 left-4 z-50">
		<div id="userBadge" class="hidden relative">
			<button id="userBadgeBtn" class="items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium cursor-pointer transition-opacity hover:opacity-80" style="background: var(--dropdown-bg); color: var(--dropdown-text); border: 1px solid var(--dropdown-border); display: flex; align-items: center;">
				<i class="fa-solid fa-user-shield"></i>
				<span id="loggedInUser"></span>
				<i class="fa-solid fa-chevron-down ml-1 text-xs"></i>
			</button>
			<div id="userDropdown" class="hidden absolute top-full left-0 mt-2 rounded-lg shadow-lg overflow-hidden min-w-[180px]" style="background: var(--dropdown-bg); border: 1px solid var(--dropdown-border);">
				<button id="openEditorFromDropdown" class="w-full text-left px-4 py-2.5 text-sm transition-colors" style="color: var(--dropdown-text);">
					<i class="fa-solid fa-users-gear mr-2"></i>Editor Manager
				</button>
				<button id="logoutFromDropdown" class="w-full text-left px-4 py-2.5 text-sm transition-colors" style="color: var(--dropdown-text);">
					<i class="fa-solid fa-right-from-bracket mr-2"></i>Logout
				</button>
			</div>
		</div>
	</div>
	<div class="fixed top-4 right-4 z-50">
		<select id="themeDropdown" class="px-3 py-2 rounded-lg text-sm cursor-pointer focus:outline-none transition-all duration-300 hover:opacity-80">
			<option value="verdant">Verdant Flow</option>
			<option value="paperbound">Paperbound</option>
			<option value="midnight">Midnight Archive</option>
			<option value="stone">Stone Silence</option>
			<option value="sunset">Sunset Clay</option>
			<option value="oceanic">Oceanic Calm</option>
			<option value="twilight">Twilight Velvet</option>
		</select>
	</div>
	<div class="fixed bottom-6 right-6 z-50">
		<button id="addEditBtn" class="px-5 py-3 rounded-full shadow-lg hover:shadow-xl hover:-translate-y-0.5 font-medium">
			<i class="fa-solid fa-pen-to-square mr-2"></i>Add/Edit
		</button>
	</div>

	<div id="editModeIndicator" class="edit-mode-indicator">
		<i class="fa-solid fa-pen"></i>
		<span>Edit Mode Active</span>
	</div>

	<div id="editBar" class="fixed bottom-20 right-6 z-50">
		<button id="viewModeBtn" class="px-5 py-3 rounded-full shadow-lg hover:shadow-xl hover:-translate-y-0.5 font-medium" style="background: var(--btn-bg); color: var(--btn-text);">
			<i class="fa-solid fa-eye mr-2"></i>View
		</button>
	</div>

	<div id="saveBar">
		<button id="addCustomerBtn" class="px-4 py-2 rounded-lg font-medium text-sm" style="background: var(--btn-bg); color: var(--btn-text);">
			<i class="fa-solid fa-plus mr-2"></i>Add Customer
		</button>
		<p class="text-sm"><i class="fa-solid fa-info-circle mr-1"></i>You have unsaved changes</p>
		<button id="saveChangesBtn" class="modal-btn-primary px-5 py-2 rounded-lg font-medium text-sm">
			<i class="fa-solid fa-save mr-2"></i>Save
		</button>
		<button id="exportBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium text-sm">
			<i class="fa-solid fa-download mr-2"></i>Export HTML File
		</button>
	<button id="importBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium text-sm">
		<i class="fa-solid fa-upload mr-2"></i>Import JSON
	</button>
	<input type="file" id="importFileInput" accept=".json" style="display: none;">
	<button id="cancelEditBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium text-sm">
		<i class="fa-solid fa-xmark mr-2"></i>Cancel
	</button>
</div>

	<div id="addCustomerModal" class="modal-overlay">
		<div class="modal-box">
			<div class="flex items-center justify-between mb-4">
				<h2 class="text-xl font-bold"><i class="fa-solid fa-user-plus mr-2"></i>Add New Customer</h2>
				<button id="closeAddCustomerBtn" class="text-2xl opacity-60 hover:opacity-100 transition-opacity">&times;</button>
			</div>
			<div class="space-y-4">
				<div>
					<label class="block text-sm font-medium mb-1">Customer Name</label>
					<input type="text" id="newCustomerName" class="modal-input w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2" placeholder="Enter customer name">
				</div>
				<div>
					<label class="block text-sm font-medium mb-2">Updates / Points</label>
					<div id="newCustomerPoints" class="space-y-3"></div>
					<button id="addNewPointBtn" class="text-sm mt-2 text-blue-500 hover:text-blue-700">
						<i class="fa-solid fa-plus mr-1"></i>Add Point
					</button>
				</div>
				<div class="flex gap-3 pt-2">
					<button id="confirmAddCustomerBtn" class="modal-btn-primary px-5 py-2 rounded-lg font-medium flex-1">
						<i class="fa-solid fa-check mr-2"></i>Add Customer
					</button>
					<button id="cancelAddCustomerBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium flex-1">Cancel</button>
				</div>
			</div>
		</div>
	</div>

	<div id="loginModal" class="modal-overlay">
		<div class="modal-box">
			<h2 class="text-xl font-bold mb-4"><i class="fa-solid fa-lock mr-2"></i>Editor Login</h2>
			<div id="loginError" class="mb-3 text-sm hidden"></div>
			<div class="space-y-4">
				<div>
					<label class="block text-sm font-medium mb-1">Username</label>
					<input type="text" id="loginUsername" class="modal-input w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2" placeholder="Enter username">
				</div>
				<div>
					<label class="block text-sm font-medium mb-1">Password</label>
					<input type="password" id="loginPassword" class="modal-input w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2" placeholder="Enter password">
				</div>
				<div class="flex gap-3 pt-2">
					<button id="loginBtn" class="modal-btn-primary px-5 py-2 rounded-lg font-medium flex-1">Login</button>
					<button id="cancelLoginBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium flex-1">Cancel</button>
				</div>
			</div>
		</div>
	</div>

	<div id="editorModal" class="modal-overlay">
		<div class="modal-box">
			<div class="flex items-center justify-between mb-4">
				<h2 class="text-xl font-bold"><i class="fa-solid fa-users-gear mr-2"></i>Editor Manager</h2>
				<button id="closeEditorBtn" class="text-2xl opacity-60 hover:opacity-100 transition-opacity">&times;</button>
			</div>
			<div id="editorList" class="space-y-3 mb-4"></div>
			<div class="border-t pt-4 mt-4" style="border-color: var(--card-divider)">
				<h3 class="text-sm font-semibold mb-3" style="color: var(--card-title)">Add New Editor</h3>
				<div class="space-y-3">
					<input type="text" id="newUsername" class="modal-input w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2" placeholder="Username">
					<input type="password" id="newPassword" class="modal-input w-full px-4 py-2 rounded-lg focus:outline-none focus:ring-2" placeholder="Password">
					<button id="addEditorBtn" class="modal-btn-primary w-full px-4 py-2 rounded-lg font-medium">
						<i class="fa-solid fa-plus mr-2"></i>Add Editor
					</button>
				</div>
			</div>
			<div class="flex gap-3 pt-4 mt-2" style="border-top: 1px solid var(--card-divider)">
				<button id="saveEditorsBtn" class="modal-btn-primary px-5 py-2 rounded-lg font-medium flex-1">
					<i class="fa-solid fa-save mr-2"></i>Save
				</button>
				<button id="exportEditorsBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium flex-1">
					<i class="fa-solid fa-download mr-2"></i>Export HTML File
				</button>
				<button id="logoutBtn" class="modal-btn-secondary px-5 py-2 rounded-lg font-medium flex-1">
					<i class="fa-solid fa-right-from-bracket mr-2"></i>Logout
				</button>
			</div>
		</div>
	</div>

	<div class="max-w-5xl mx-auto text-base">
		<div class="text-center mb-8">
			<h1 id="titleText" class="text-5xl font-bold mb-2">
				<i class="fa-solid fa-users mr-2"></i>Customer Updates
			</h1>

		async function sha256(message) {
			try {
				const msgBuffer = new TextEncoder().encode(message);
				const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
				const hashArray = Array.from(new Uint8Array(hashBuffer));
				return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
			} catch(e) {
				console.warn('Crypto API unavailable (file:// protocol), using fallback hash');
				let hash = 0;
				for (let i = 0; i < message.length; i++) {
					const char = message.charCodeAt(i);
					hash = ((hash << 5) - hash) + char;
					hash = hash & hash;
				}
				return Math.abs(hash).toString(16).padStart(64, '0');
			}
		}

							subsHTML += '</ul>';
						}
						pointsHTML += `<div class="${idx > 0 ? 'mt-4 pt-4 card-divider border-t' : ''}"><p class="card-text text-base flex items-start gap-2 group"><i class="fa-solid fa-circle accent-dot text-[8px] mt-2 flex-shrink-0"></i><span class="flex-1 ${isEditMode ? 'editable-text' : ''}" ${isEditMode ? `contenteditable="true" data-customer="${realIndex}" data-point="${idx}" data-sub="new"` : ''}>${isEditMode ? point.main : `<span>${point.main}</span>`}</span>${isEditMode ? `<i class="fa-solid fa-xmark remove-btn text-red-400 text-xs mt-1" data-customer="${realIndex}" data-point="${idx}" data-sub="remove-point" title="Remove point"></i>` : ''}</p>${subsHTML}${isEditMode ? `<button class="add-sub-btn text-xs mt-2 ml-8 text-blue-500 hover:text-blue-700" data-customer="${realIndex}" data-point="${idx}"><i class="fa-solid fa-plus mr-1"></i>Add sub-point</button>` : ''}</div>`;
					});
					card.innerHTML = `<div class="flex items-center gap-4 mb-4 pb-4 card-divider border-b relative"><div class="w-12 h-12 rounded-lg ${iconConfig.bg} flex items-center justify-center flex-shrink-0 transition-all duration-300 hover:scale-110 hover:rotate-3"><i class="fa-solid ${iconConfig.icon} ${iconConfig.color} text-lg transition-transform duration-300"></i></div><h2 class="card-title text-lg font-semibold transition-colors duration-300 ${isEditMode ? 'edit-name' : ''}" ${isEditMode ? `contenteditable="true" data-customer="${realIndex}" data-field="name"` : ''}>${customer.name}</h2>${isEditMode ? `<button class="delete-customer-btn text-red-400 hover:text-red-600 text-sm" data-customer="${realIndex}" title="Delete customer"><i class="fa-solid fa-trash"></i></button>` : ''}</div>${pointsHTML}${isEditMode ? `<button class="add-point-btn text-xs mt-3 text-blue-500 hover:text-blue-700" data-customer="${realIndex}"><i class="fa-solid fa-plus mr-1"></i>Add point</button>` : ''}`;
					customerList.appendChild(card);
				});
			}
			if (isEditMode) {
				customerList.querySelectorAll('.editable-text, .edit-name').forEach(el => { el.addEventListener('blur', handleEdit); });
				customerList.querySelectorAll('.delete-customer-btn').forEach(btn => { btn.addEventListener('click', (e) => { customersData.splice(parseInt(e.currentTarget.dataset.customer), 1); renderCustomers(customersData); }); });
				customerList.querySelectorAll('.remove-btn').forEach(btn => {
					btn.addEventListener('click', (e) => {
						const cIdx = parseInt(e.currentTarget.dataset.customer);
						const pIdx = parseInt(e.currentTarget.dataset.point);
						const sIdx = e.currentTarget.dataset.sub;
						if (sIdx === 'remove-point') { customersData[cIdx].points.splice(pIdx, 1); }
						else if (sIdx !== 'new') { customersData[cIdx].points[pIdx].subs.splice(parseInt(sIdx), 1); }
						renderCustomers(customersData);
					});
				});
				customerList.querySelectorAll('.add-point-btn').forEach(btn => {
					btn.addEventListener('click', (e) => {
						const idx = parseInt(e.currentTarget.dataset.customer);
						customersData[idx].points.push({ main: '', subs: [] });
						renderCustomers(customersData);
						setTimeout(() => { const np = customerList.querySelector(`[data-customer="${idx}"][data-point="${customersData[idx].points.length - 1}"]:not([data-sub])`); if (np) np.focus(); }, 50);
					});
				});
				customerList.querySelectorAll('.add-sub-btn').forEach(btn => {
					btn.addEventListener('click', (e) => {
						const cIdx = parseInt(e.currentTarget.dataset.customer);
						const pIdx = parseInt(e.currentTarget.dataset.point);
						customersData[cIdx].points[pIdx].subs.push('');
						renderCustomers(customersData);
						setTimeout(() => { const ns = customerList.querySelector(`[data-customer="${cIdx}"][data-point="${pIdx}"][data-sub="${customersData[cIdx].points[pIdx].subs.length - 1}"]`); if (ns) ns.focus(); }, 50);
					});
				});
			}
		}

		function handleEdit(e) {
			const el = e.target;
			const cIdx = parseInt(el.dataset.customer);
			if (el.dataset.field === 'name') { customersData[cIdx].name = el.textContent.trim() || 'Unnamed'; }
			else if (el.dataset.sub !== undefined) {
				const pIdx = parseInt(el.dataset.point);
				const sIdx = el.dataset.sub;
				if (sIdx === 'new') { const val = el.textContent.trim(); if (val) { customersData[cIdx].points[pIdx].subs.push(val); } renderCustomers(customersData); return; }
				else { const sIdxNum = parseInt(sIdx); const val = el.textContent.trim(); if (!val) { customersData[cIdx].points[pIdx].subs.splice(sIdxNum, 1); renderCustomers(customersData); return; } customersData[cIdx].points[pIdx].subs[sIdxNum] = val; }
			} else if (el.dataset.point !== undefined) { customersData[cIdx].points[parseInt(el.dataset.point)].main = el.textContent.trim() || 'New point'; }
		}

		function applyTheme(theme) { document.body.className = document.body.className.replace(/theme-\w+/, 'theme-' + theme); themeDropdown.value = theme; }
		// Always set theme to 'midnight' on load
		applyTheme('midnight');
		themeDropdown.addEventListener('change', (e) => { applyTheme(e.target.value); });

		searchBar.addEventListener('input', (e) => {
			if (customersData.length === 0) return;
			const query = e.target.value.trim().toLowerCase();
			if (!query) { renderCustomers(customersData); return; }
			const queryWords = query.split(/\s+/);
			const filtered = customersData.filter(customer => {
				const nameLower = customer.name.toLowerCase();
				const pointsText = customer.points.map(p => p.main + ' ' + p.subs.join(' ')).join(' ').toLowerCase();
				return queryWords.every(word => nameLower.includes(word) || pointsText.includes(word));
			});
			renderCustomers(filtered);
		});
	</script>
</body>
</html>

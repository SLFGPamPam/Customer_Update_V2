		async function sha256(message) {
			const msgBuffer = new TextEncoder().encode(message);
			const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
			const hashArray = Array.from(new Uint8Array(hashBuffer));
			return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
		}

		function renderCustomers(filteredCustomers) {
			customerList.innerHTML = '';

			if (filteredCustomers.length === 0) {
				noResults.classList.remove('hidden');
			} else {
				noResults.classList.add('hidden');
				filteredCustomers.forEach((customer, index) => {
					const card = document.createElement('div');
					card.className = 'customer-card rounded-xl p-6 shadow-sm hover:shadow-lg hover:-translate-y-1 cursor-default';

					const iconConfig = iconMap[index % iconMap.length];

					let pointsHTML = '';
					customer.points.forEach((point, idx) => {
						let subsHTML = '';
						if (point.subs.length > 0) {
							subsHTML = '<ul class="ml-8 mt-2 space-y-2">';
							point.subs.forEach(sub => {
								subsHTML += `<li class="card-sub text-base flex items-start"><i class="fa-regular fa-circle accent-dot text-[8px] mt-2 mr-2.5 flex-shrink-0"></i><span>${sub}</span></li>`;
							});
							subsHTML += '</ul>';
						}
						pointsHTML += `
							<div class="${idx > 0 ? 'mt-4 pt-4 card-divider border-t' : ''}">
								<p class="card-text text-base flex items-start"><i class="fa-solid fa-circle accent-dot text-[8px] mt-2 mr-3 flex-shrink-0"></i><span>${point.main}</span></p>
								${subsHTML}
							</div>
						`;
					});

					card.innerHTML = `
						<div class="flex items-center gap-4 mb-4 pb-4 card-divider border-b">
							<div class="w-12 h-12 rounded-lg ${iconConfig.bg} flex items-center justify-center flex-shrink-0 transition-all duration-300 hover:scale-110 hover:rotate-3">
								<i class="fa-solid ${iconConfig.icon} ${iconConfig.color} text-lg transition-transform duration-300"></i>
							</div>
							<h2 class="card-title text-lg font-semibold transition-colors duration-300">${customer.name}</h2>
						</div>
						${pointsHTML}
					`;
					customerList.appendChild(card);
				});
			}
		}

		function applyTheme(theme) {
			document.body.className = document.body.className.replace(/theme-\w+/, 'theme-' + theme);
			localStorage.setItem('selectedTheme', theme);
			themeDropdown.value = theme;
		}

		const savedTheme = localStorage.getItem('selectedTheme') || 'verdant';
		applyTheme(savedTheme);

		themeDropdown.addEventListener('change', (e) => {
			applyTheme(e.target.value);
		});

		searchBar.addEventListener('input', (e) => {
			if (customersData.length === 0) return;
			const query = e.target.value.trim().toLowerCase();
			if (!query) {
				renderCustomers(customersData);
				return;
			}
			const queryWords = query.split(/\s+/);
			const filtered = customersData.filter(customer => {
				const nameLower = customer.name.toLowerCase();
				const pointsText = customer.points.map(p => p.main + ' ' + p.subs.join(' ')).join(' ').toLowerCase();
				return queryWords.every(word => nameLower.includes(word) || pointsText.includes(word));
			});
			renderCustomers(filtered);
		});
